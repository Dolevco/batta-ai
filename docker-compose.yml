services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ai-agent-network

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - ai-agent-network

  # Neo4j graph database (for connector-usage / examples)
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # BOLT
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - ai-agent-network

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - packages/api/.env
    environment:
      # Override specific values for Docker environment
      - PORT=3001
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - HTTPS=false
      # Provide DB connection info for examples and services
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - qdrant
      - redis
      - neo4j
    networks:
      - ai-agent-network

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - ai-agent-network

volumes:
  qdrant_storage:
    driver: local
  neo4j_data:
    driver: local

networks:
  ai-agent-network:
    driver: bridge
